<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 2 - Guess the Number</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <h1>Guess the Number</h1>
    <p class="subtitle">Guess a number between 1 and 99. You have 7 attempts.</p>

    <label for="guessInput">Enter your guess:</label>
    <input type="number" id="guessInput" min="1" max="99" placeholder="1 - 99">

    <div class="button-row">
      <button id="guessBtn">Guess</button>
      <button id="resetBtn">Reset</button>
    </div>

    <p id="errorMessage"></p>
    <p id="resultMessage"></p>

    <div class="info-box">
      <p><strong>Attempts:</strong> <span id="attemptCount">0</span> / 7</p>
      <p><strong>Previous guesses:</strong> <span id="attemptsList">None yet</span></p>
    </div>

    <div class="stats">
      <div class="statBox">
        <h3>Wins</h3>
        <p id="wins">0</p>
      </div>

      <div class="statBox">
        <h3>Losses</h3>
        <p id="losses">0</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
