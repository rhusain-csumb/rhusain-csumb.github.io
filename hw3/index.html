<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rick and Morty Character Search</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>Rick and Morty Character Search</h1>
      <p>Search for characters by name and optionally filter by species.</p>
    </header>

    <main class="container">
      <section class="search-panel">
        <form id="characterForm" novalidate>
          <div class="form-group">
            <label for="name">Character Name <span>*</span></label>
            <input
              type="text"
              id="name"
              placeholder="e.g. Rick, Morty"
              required
            />
            <small class="error" id="nameError"></small>
          </div>

          <div class="form-group">
            <label for="species">Species</label>
            <select id="species">
              <option value="">Any species</option>
              <option value="Human">Human</option>
              <option value="Alien">Alien</option>
              <option value="Humanoid">Humanoid</option>
              <option value="Robot">Robot</option>
            </select>
          </div>

          <div class="button-row">
            <button type="submit">Search</button>
            <button type="reset" id="resetBtn" class="secondary">Clear</button>
          </div>
        </form>
      </section>

      <section class="results-panel">
        <div id="statusMessage" class="status">
          Enter a character name to begin.
        </div>
        <div id="results" class="results-grid"></div>
      </section>
    </main>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
